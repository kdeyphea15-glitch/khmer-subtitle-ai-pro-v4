services:
  - type: web
    name: khmer-subtitle-ai-pro-v4-server
    runtime: node
    rootDir: server
    buildCommand: |
      cd ..
      python3 -m venv .venv-demucs
      . .venv-demucs/bin/activate
      python3 -m pip install --upgrade pip
      python3 -m pip install demucs
      cd server
      npm install
      npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
